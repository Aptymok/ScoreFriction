[build]
builder = "nixpacks"

[deploy]
# Usamos el objeto 'app' importado en main.py
startCommand = "gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -"
# Cambiado a raíz para evitar fallos si /health no está programado
healthcheckPath = "/" 
# Aumentamos el tiempo de espera para la carga de MIHM y módulos de audio
healthcheckTimeout = 60
restartPolicyType = "on_failure"