<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System Friction</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: Arial; text-align: center; padding: 2rem; }
        h1 { color: #ff3366; }
        .ok { color: #0f0; }
        .error { color: #f66; }
        button { background: #ff3366; border: none; padding: 10px 20px; color: white; cursor: pointer; }
        pre { background: #1a1a1a; padding: 1rem; text-align: left; max-width: 80%; margin: auto; overflow: auto; }
    </style>
</head>
<body>
    <h1>⚡ System Friction</h1>
    <p>Backend: <span id="status" class="error">Comprobando...</span></p>
    <button onclick="testBackend()">Probar conexión</button>
    <pre id="log"></pre>

    <script>
        const API_URL = 'https://scorefriction-production.up.railway.app';
        const log = (msg) => {
            const pre = document.getElementById('log');
            pre.textContent += msg + '\n';
        };
        async function testBackend() {
            const span = document.getElementById('status');
            log('Conectando a ' + API_URL + '/health ...');
            try {
                const res = await fetch(API_URL + '/health');
                if (res.ok) {
                    const data = await res.json();
                    span.textContent = '✅ Conectado';
                    span.className = 'ok';
                    log('Respuesta: ' + JSON.stringify(data));
                } else {
                    throw new Error('HTTP ' + res.status);
                }
            } catch(e) {
                span.textContent = '❌ Sin conexión';
                span.className = 'error';
                log('Error: ' + e.message);
                log('Asegúrate de que Railway esté funcionando. Mira los logs en railway.app');
            }
        }
        testBackend();
    </script>
</body>
</html>
